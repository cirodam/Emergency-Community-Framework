services:
  globe:
    build:
      context: .
      dockerfile: packages/globe/Dockerfile
    ports:
      - "3030:3030"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      BANK_URL: http://globe-bank:3031
      FOUNDING_COMMONWEALTH_URL: ""
    volumes:
      - globe-data:/app/data
    depends_on:
      - globe-bank

  globe-bank:
    build:
      context: .
      dockerfile: packages/bank/Dockerfile
    ports:
      - "3031:3031"
    environment:
      NODE_ENV:     production
      DATA_DIR:     /app/data
      PORT:         3031
      COMMUNITY_URL: http://globe:3030
      OWNER_TYPE:   globe
    volumes:
      - globe-bank-data:/app/data

volumes:
  globe-data:
  globe-bank-data:
