services:
  community:
    build:
      context: .
      dockerfile: packages/community/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      BANK_URL: http://bank:3001
      # SMS banking — set SMS_MODEM_PATH to enable (e.g. /dev/ttyUSB0).
      # SMS_MODEM_PATH: /dev/ttyUSB0
      # SMS_MODEM_BAUD: 9600
      # SMS_WEBHOOK_SECRET: changeme   # for the optional inbound webhook
    volumes:
      - community-data:/app/data
    # Uncomment to pass through the GSM modem device:
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"

  bank:
    build:
      context: .
      dockerfile: packages/bank/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - bank-data:/app/data
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      COMMUNITY_URL: http://community:3002
      OWNER_TYPE: community
      PUBLIC_COMMUNITY_URL: http://localhost:3002
      PUBLIC_BANK_URL: http://localhost:3001
      PUBLIC_MARKET_URL: http://localhost:3003
      PUBLIC_MAIL_URL: http://localhost:3020
    depends_on:
      - community

  market:
    build:
      context: .
      dockerfile: packages/market/Dockerfile
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      BANK_URL: http://bank:3001
      COMMUNITY_URL: http://community:3002
      PUBLIC_COMMUNITY_URL: http://localhost:3002
      PUBLIC_BANK_URL: http://localhost:3001
      PUBLIC_MARKET_URL: http://localhost:3003
      PUBLIC_MAIL_URL: http://localhost:3020
    volumes:
      - market-data:/app/data
    depends_on:
      - bank
      - community

  mail:
    build:
      context: .
      dockerfile: packages/mail/Dockerfile
    ports:
      - "3020:3020"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      COMMUNITY_URL: http://community:3002
      PUBLIC_COMMUNITY_URL: http://localhost:3002
      PUBLIC_BANK_URL: http://localhost:3001
      PUBLIC_MARKET_URL: http://localhost:3003
      PUBLIC_MAIL_URL: http://localhost:3020
    volumes:
      - mail-data:/app/data
    depends_on:
      - community

volumes:
  bank-data:
  community-data:
  market-data:
  mail-data:
