services:
  community:
    build:
      context: .
      dockerfile: packages/community/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      BANK_URL: http://bank:3001
    volumes:
      - community-data:/app/data

  bank:
    build:
      context: .
      dockerfile: packages/bank/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - bank-data:/app/data
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      COMMUNITY_URL: http://community:3002
      OWNER_TYPE: community
    depends_on:
      - community

volumes:
  bank-data:
  community-data:
