services:
  bank:
    build:
      context: .
      dockerfile: packages/bank/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - bank-data:/data
    environment:
      NODE_ENV: production
      DATA_DIR: /data

  federation:
    build:
      context: .
      dockerfile: packages/federation/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      BANK_URL: http://bank:3001
    depends_on:
      - bank
    volumes:
      - federation-data:/data

volumes:
  bank-data:
  federation-data:
