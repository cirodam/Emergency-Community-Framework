services:
  federation:
    build:
      context: .
      dockerfile: packages/federation/Dockerfile
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      BANK_URL: http://federation-bank:3011
      FOUNDING_COMMUNITY_URL: http://community:3002
    volumes:
      - federation-data:/app/data
    depends_on:
      - federation-bank

  federation-bank:
    build:
      context: .
      dockerfile: packages/bank/Dockerfile
    ports:
      - "3011:3011"
    environment:
      NODE_ENV:     production
      DATA_DIR:     /app/data
      PORT:         3011
      COMMUNITY_URL: http://federation:3010
      OWNER_TYPE:   federation
    volumes:
      - federation-bank-data:/app/data

volumes:
  federation-data:
  federation-bank-data:

